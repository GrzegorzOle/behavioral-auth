general:
  mode: dev

# Parametry zredukowane dla dev – szybkie testowanie pipeline
features:
  window_sec: 15          # okno 15s zamiast 30s
  stride_sec: 3           # krok 3s zamiast 5s
  min_keyboard_events: 3  # mniej surowy próg
  min_mouse_events: 3

model:
  seq_len: 8     # krótsza sekwencja (była 24)
  epochs: 10     # mniej epok (było 25)
